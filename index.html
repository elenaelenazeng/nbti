<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NBTI - 牛逼人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 首页 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首页样式 */
        .home-page {
            text-align: center;
            padding-top: 60px;
        }

        .logo {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffd200 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(245, 87, 108, 0.5);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 18px;
            color: #a0a0a0;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .tagline {
            font-size: 24px;
            margin-bottom: 60px;
            line-height: 1.6;
        }

        .tagline span {
            display: block;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* 问题页样式 */
        .question-page {
            padding-top: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .question-num {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 18px 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            line-height: 1.4;
        }

        .option:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(245, 87, 108, 0.5);
            transform: translateX(5px);
        }

        .option:active {
            transform: scale(0.98);
        }

        /* 结果页样式 */
        .result-page {
            text-align: center;
            padding-top: 40px;
        }

        .result-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .result-word {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 6px;
        }

        .result-chinese {
            font-size: 28px;
            margin-bottom: 30px;
            color: #ccc;
        }

        .result-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .result-desc {
            font-size: 18px;
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 25px;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .tag {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .dimensions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .dimension {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
        }

        .dimension-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .dimension-value {
            font-size: 16px;
            font-weight: 600;
        }

        .share-section {
            margin-top: 30px;
        }

        .share-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 16px 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            margin-right: 10px;
        }

        .retry-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 14px 40px;
            font-size: 16px;
            color: #aaa;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .retry-btn:hover {
            border-color: rgba(255,255,255,0.4);
            color: #fff;
        }

        /* 结果颜色主题 */
        .result-king { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-boss { background: linear-gradient(135deg, #c0c0c0 0%, #808080 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-star { background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-fire { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-wolf { background: linear-gradient(135deg, #434343 0%, #000000 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-sage { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-moon { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-seed { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-loud { background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-hype { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-buzz { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-foam { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-chill { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-slow { background: linear-gradient(135deg, #b79891 0%, #94716b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-lurk { background: linear-gradient(135deg, #373b44 0%, #4286f4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-sofa { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Toast提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        /* 动画效果 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .result-word {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>

        </div>

        <!-- 结果页 -->
        <div class="page result-page" id="resultPage">
            <div class="result-label">你的NBTI人格是</div>
            <div class="result-word" id="resultWord"></div>
            <div class="result-chinese" id="resultChinese"></div>

                <div class="result-desc" id="resultDesc"></div>
                <div class="result-tags" id="resultTags"></div>
                <div class="dimensions" id="dimensions"></div>
            </div>
            <div class="share-section">
                <button class="share-btn" onclick="shareResult()">分享结果 ✨</button>
                <br>
                <button class="retry-btn" onclick="restart()">再测一次</button>
            </div>

    </div>

    <div class="toast" id="toast"></div>

                word: 'SOFA',
                chinese: '🛋️ 沙发',
                desc: '你就是躺着刷手机的普通人，不牛逼也不装牛逼，真实得可爱。这不挺好的嘛！',
                tags: ['普通但自洽', '躺平达人', '舒适至上', '反卷先锋'],
                color: 'sofa'
            }
        };

        // 状态变量
        let currentQuestion = 0;
        let scores = {
            real: 0,    // 真实程度：正=真牛，负=装牛
            show: 0,    // 外显程度：正=张扬，负=低调  
            talent: 0,  // 来源：正=天赋，负=努力
            online: 0   // 场景：正=线上，负=线下
        };

        // 开始测试
        function startTest() {
            currentQuestion = 0;
            scores = { real: 0, show: 0, talent: 0, online: 0 };
            showPage('questionPage');
            showQuestion();
        }

        // 显示页面
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 显示问题
        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNum').textContent = `问题 ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

            const optionsHtml = q.options.map((opt, idx) => 
                `<div class="option" onclick="selectOption(${idx})">${opt.text}</div>`
            ).join('');
            document.getElementById('options').innerHTML = optionsHtml;
        }

        // 选择选项
        function selectOption(idx) {
            const q = questions[currentQuestion];
            const selected = q.options[idx];
            
            // 累加分数
            for (let key in selected.scores) {
                scores[key] += selected.scores[key];
            }

            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 计算并显示结果
        function showResult() {
            // 根据四个维度确定人格
            const isReal = scores.real > 0;
            const isShow = scores.show > 0;
            const isTalent = scores.talent > 0;
            const isOnline = scores.online > 0;

            let resultKey;
            
            if (isReal && isShow && isTalent && !isOnline) resultKey = 'KING';
            else if (isReal && isShow && !isTalent && !isOnline) resultKey = 'BOSS';
            else if (isReal && isShow && isTalent && isOnline) resultKey = 'STAR';
            else if (isReal && isShow && !isTalent && isOnline) resultKey = 'FIRE';
            else if (isReal && !isShow && isTalent && !isOnline) resultKey = 'WOLF';
            else if (isReal && !isShow && !isTalent && !isOnline) resultKey = 'SAGE';
            else if (isReal && !isShow && isTalent && isOnline) resultKey = 'MOON';
            else if (isReal && !isShow && !isTalent && isOnline) resultKey = 'SEED';
            else if (!isReal && isShow && isTalent && !isOnline) resultKey = 'LOUD';
            else if (!isReal && isShow && !isTalent && !isOnline) resultKey = 'HYPE';
            else if (!isReal && isShow && isTalent && isOnline) resultKey = 'BUZZ';
            else if (!isReal && isShow && !isTalent && isOnline) resultKey = 'FOAM';
            else if (!isReal && !isShow && isTalent && !isOnline) resultKey = 'CHILL';
            else if (!isReal && !isShow && !isTalent && !isOnline) resultKey = 'SLOW';
            else if (!isReal && !isShow && isTalent && isOnline) resultKey = 'LURK';
            else resultKey = 'SOFA';

            const result = results[resultKey];

            document.getElementById('resultWord').textContent = result.word;
            document.getElementById('resultWord').className = `result-word result-${result.color}`;
            document.getElementById('resultChinese').textContent = result.chinese;
            document.getElementById('resultDesc').textContent = result.desc;

            const tagsHtml = result.tags.map(t => `<span class="tag">#${t}</span>`).join('');
            document.getElementById('resultTags').innerHTML = tagsHtml;

            const dimensionsHtml = `
                <div class="dimension">
                    <div class="dimension-label">牛逼真实度</div>
                    <div class="dimension-value">${isReal ? '✅ 真牛逼' : '🎭 精神牛逼'}</div>
                </div>
                <div class="dimension">
                    <div class="dimension-label">外显程度</div>
                    <div class="dimension-value">${isShow ? '📢 高调张扬' : '🤫 闷声低调'}</div>
                </div>
                <div class="dimension">
                    <div class="dimension-label">牛逼来源</div>
                    <div class="dimension-value">${isTalent ? '🎁 老天赏饭' : '💪 后天努力'}</div>
                </div>
                <div class="dimension">
                    <div class="dimension-label">主战场</div>
                    <div class="dimension-value">${isOnline ? '🌐 线上赛博' : '🏢 线下现实'}</div>
                </div>
            `;
            document.getElementById('dimensions').innerHTML = dimensionsHtml;

            showPage('resultPage');
        }

        // 分享结果
        function shareResult() {
            const resultWord = document.getElementById('resultWord').textContent;
            const resultChinese = document.getElementById('resultChinese').textContent;
            const text = `我在NBTI测试中是「${resultWord}」${resultChinese}！快来测测你是哪种牛逼人格？`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'NBTI 牛逼人格测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href).then(() => {
                    showToast('已复制到剪贴板，快去分享吧！');
                });
            }
        }

        // 重新测试
        function restart() {
            showPage('homePage');
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
