<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NBTI 3.0 - 牛逼人格测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FAF9F6; min-height: 100vh; color: #1a1a1a; }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        .home-page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; text-align: center; }
        
        .home-title { font-size: 48px; font-weight: 900; color: #FF6B6B; margin-bottom: 8px; }
        .home-subtitle { font-size: 18px; color: #666; margin-bottom: 6px; }
        .home-version { font-size: 12px; color: #aaa; margin-bottom: 32px; }
        .home-desc { font-size: 14px; color: #888; line-height: 1.8; margin-bottom: 36px; }
        
        .start-btn { width: 100%; max-width: 280px; padding: 16px; font-size: 18px; font-weight: 700; border: none; border-radius: 50px; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
        .start-btn:active { transform: scale(0.96); }

        .progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FF6B6B, #FF8E53); border-radius: 2px; transition: width 0.3s; }
        .question-counter { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 16px; }
        .question-text { font-size: 18px; font-weight: 700; line-height: 1.5; text-align: center; margin-bottom: 24px; min-height: 60px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; padding: 14px 16px; font-size: 15px; line-height: 1.4; text-align: left; border: 2px solid #eee; border-radius: 14px; background: white; cursor: pointer; color: #333; }
        .option-btn:active { transform: scale(0.98); border-color: #FF6B6B; background: #FFF5F5; }
        .option-btn.selected { border-color: #FF6B6B; background: #FFF5F5; color: #FF6B6B; font-weight: 600; }

        .result-page { padding-bottom: 30px; }
        .result-header { text-align: center; margin-bottom: 16px; }
        .result-avatar { width: 160px; height: 180px; margin: 0 auto 10px; }
        .result-avatar svg { width: 100%; height: 100%; }
        .result-type-name { font-size: 28px; font-weight: 900; margin-bottom: 2px; }
        .result-type-sub { font-size: 14px; color: #888; margin-bottom: 6px; }
        .result-quote { font-size: 13px; color: #FF6B6B; font-style: italic; padding: 0 20px; }

        .card { background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .card-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        
        .nb-meter-title { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .nb-meter-value { font-size: 24px; font-weight: 900; color: #FF6B6B; }
        .nb-bar { width: 100%; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .nb-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #FF6B6B, #FF8E53, #FECA57); }
        .nb-rarity { font-size: 11px; color: #aaa; margin-top: 6px; text-align: right; }

        .dim-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .dim-label { width: 55px; text-align: right; color: #888; }
        .dim-label-r { width: 55px; text-align: left; color: #888; }
        .dim-bar-wrap { flex: 1; height: 6px; background: #f0f0f0; border-radius: 3px; margin: 0 8px; position: relative; }
        .dim-bar-fill { position: absolute; height: 100%; border-radius: 3px; }
        .dim-bar-fill.left { right: 50%; background: linear-gradient(270deg, #FF6B6B, #FF6B6B88); }
        .dim-bar-fill.right { left: 50%; background: linear-gradient(90deg, #48DBFB, #48DBFB88); }
        .dim-bar-center { position: absolute; left: 50%; top: -2px; width: 2px; height: 10px; background: #ddd; transform: translateX(-50%); }

        .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        
        .analysis-text { font-size: 13px; line-height: 1.7; color: #555; }

        .opposite-section { display: flex; align-items: center; gap: 12px; }
        .opposite-avatar { width: 60px; height: 70px; flex-shrink: 0; }
        .opposite-avatar svg { width: 100%; height: 100%; }
        .opposite-info { flex: 1; }
        .opposite-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .opposite-name { font-size: 15px; font-weight: 700; }
        .opposite-desc { font-size: 12px; color: #888; margin-top: 2px; }

        .retry-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; box-shadow: 0 3px 12px rgba(255,107,107,0.3); margin-top: 16px; }
        .retry-btn:active { transform: scale(0.96); }
        .watermark { text-align: center; font-size: 11px; color: #ccc; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page home-page active" id="homePage">
        <div class="home-title">NBTI</div>
        <div class="home-subtitle">牛逼人格类型指标</div>
        <div class="home-version">Niubi Type Indicator 3.0</div>
        <div class="home-desc">20道灵魂拷问<br>测出你在社会中的牛逼浓度<br>找到属于你的牛逼人格 🔥</div>
        <button class="start-btn" onclick="startQuiz()">开始测试 →</button>
    </div>

    <div class="page" id="quizPage">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="question-counter" id="questionCounter"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsWrap"></div>
    </div>

    <div class="page result-page" id="resultPage">
        <div class="result-header">
            <div class="result-avatar" id="resultAvatar"></div>
            <div class="result-type-name" id="resultTypeName"></div>
            <div class="result-type-sub" id="resultTypeSub"></div>
            <div class="result-quote" id="resultQuote"></div>
        </div>
        <div class="card">
            <div class="nb-meter-title"><span>🔥 牛逼浓度</span><span class="nb-meter-value" id="nbValue"></span></div>
            <div class="nb-bar"><div class="nb-bar-fill" id="nbBarFill"></div></div>
            <div class="nb-rarity" id="nbRarity"></div>
        </div>
        <div class="card">
            <div class="card-title">📊 四维人格</div>
            <div id="dimRows"></div>
        </div>
        <div class="card">
            <div class="card-title">🏷️ 你的标签</div>
            <div class="tags-wrap" id="tagsWrap"></div>
        </div>
        <div class="card">
            <div class="card-title">💬 性格简评</div>
            <div class="analysis-text" id="analysisText"></div>
        </div>
        <div class="card opposite-section" id="oppositeSection">
            <div class="opposite-avatar" id="oppositeAvatar"></div>
            <div class="opposite-info">
                <div class="opposite-label">😈 你的反面人格</div>
                <div class="opposite-name" id="oppositeName"></div>
                <div class="opposite-desc" id="oppositeDesc"></div>
            </div>
        </div>
        <button class="retry-btn" onclick="retryQuiz()">再测一次</button>
        <div class="watermark">NBTI 3.0 · 牛逼人格测试</div>
    </div>
</div>

<script>

var DIM_LABELS = [['实力型','氛围型'],['高调型','低调型'],['社交型','独处型'],['冲锋型','佛系型']];
var currentQ = 0;
var scores = [0,0,0,0];

function startQuiz() {
    currentQ = 0;
    scores = [0,0,0,0];
    document.getElementById('homePage').classList.remove('active');
    document.getElementById('quizPage').classList.add('active');
    document.getElementById('resultPage').classList.remove('active');
    renderQuestion();
}

function renderQuestion() {
    var q = QUESTIONS[currentQ];
    document.getElementById('progressFill').style.width = ((currentQ+1)/QUESTIONS.length*100)+'%';
    document.getElementById('questionCounter').textContent = (currentQ+1)+' / '+QUESTIONS.length;
    document.getElementById('questionText').textContent = q.q;
    var wrap = document.getElementById('optionsWrap');
    wrap.innerHTML = '';
    for(var i=0;i<q.opts.length;i++){
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = q.opts[i].t;
        btn.setAttribute('data-idx',i);
        btn.onclick = function(){
            var idx = parseInt(this.getAttribute('data-idx'));
            var s = QUESTIONS[currentQ].opts[idx].s;
            for(var j=0;j<4;j++) scores[j]+=s[j];
            this.classList.add('selected');
            var self = this;
            setTimeout(function(){
                currentQ++;
                if(currentQ>=QUESTIONS.length) showResult();
                else renderQuestion();
            },300);
        };
        wrap.appendChild(btn);
    }
}

function calcType() {
    var best='CHILL', bestScore=-999999;
    var max = QUESTIONS.length*2;
    var norm = [];
    for(var i=0;i<4;i++){
        var p = ((scores[i]+max)/(max*2))*100;
        norm.push(Math.max(0,Math.min(100,p)));
    }
    for(var k in TYPES){
        if(!TYPES.hasOwnProperty(k)) continue;
        var sim = 0;
        for(var i=0;i<4;i++) sim -= Math.pow(norm[i]-TYPES[k].dims[i],2);
        if(sim>bestScore){ bestScore=sim; best=k; }
    }
    return best;
}

function showResult() {
    var key = calcType();
    var t = TYPES[key];
    document.getElementById('quizPage').classList.remove('active');
    document.getElementById('resultPage').classList.add('active');
    document.getElementById('resultAvatar').innerHTML = makeSVG(key);
    var tn = document.getElementById('resultTypeName');
    tn.textContent = t.name+' · '+t.cn;
    tn.style.color = t.color;
    document.getElementById('resultTypeSub').textContent = '你的NBTI人格类型';
    document.getElementById('resultQuote').textContent = t.quote;
    document.getElementById('nbValue').textContent = t.nb+'%';
    document.getElementById('nbBarFill').style.width = t.nb+'%';
    document.getElementById('nbRarity').textContent = '👥 仅 '+t.rarity+'% 的人和你一样';
    var dr = document.getElementById('dimRows');
    dr.innerHTML = '';
    for(var i=0;i<t.dims.length;i++){
        var v = t.dims[i];
        var row = document.createElement('div');
        row.className = 'dim-row';
        var bar = v>=50 ? '<div class="dim-bar-fill right" style="width:'+(v-50)+'%"></div>' : '<div class="dim-bar-fill left" style="width:'+(50-v)+'%"></div>';
        row.innerHTML = '<span class="dim-label">'+DIM_LABELS[i][0]+'</span><div class="dim-bar-wrap"><div class="dim-bar-center"></div>'+bar+'</div><span class="dim-label-r">'+DIM_LABELS[i][1]+'</span>';
        dr.appendChild(row);
    }
    var tw = document.getElementById('tagsWrap');
    tw.innerHTML = '';
    for(var i=0;i<t.tags.length;i++){
        var sp = document.createElement('span');
        sp.className = 'tag';
        sp.textContent = t.tags[i];
        sp.style.background = 'linear-gradient(135deg,'+t.bg+','+t.color+'15)';
        sp.style.color = t.color;
        tw.appendChild(sp);
    }
    document.getElementById('analysisText').textContent = t.analysis;
    var opp = TYPES[t.opposite];
    document.getElementById('oppositeAvatar').innerHTML = makeSVG(t.opposite);
    var on = document.getElementById('oppositeName');
    on.textContent = opp.name+' · '+opp.cn;
    on.style.color = opp.color;
    document.getElementById('oppositeDesc').textContent = opp.quote;
}

function retryQuiz() {
    document.getElementById('resultPage').classList.remove('active');
    document.getElementById('quizPage').classList.remove('active');
    document.getElementById('homePage').classList.add('active');
}
